name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build community dev zip
        run: |
          npm ci
          npm run build:community
          (cd dist && zip -r ../x-viral-monitor-${{ github.ref_name }}-community-dev.zip .)

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: x-viral-monitor-${{ github.ref_name }}-community-dev.zip
          body: |
            ## X Viral Monitor ${{ github.ref_name }}

            This GitHub release ships the **Community DEV** build. Local Pro features are enabled by default for sideloaded community installs.

            Use the Chrome Web Store build if you want automatic updates, official license activation, and the supported Pro subscription path.

            ### Install

            1. Download `x-viral-monitor-${{ github.ref_name }}-community-dev.zip` below
            2. Unzip the downloaded file
            3. Open Chrome → `chrome://extensions/`
            4. Toggle **Developer mode** on (top right corner)
            5. Click **Load unpacked** (top left)
            6. Select the unzipped folder and confirm
            7. Visit [x.com](https://x.com) and enjoy!

            ### Velocity Tiers

            | Icon | Velocity | Meaning |
            |------|----------|---------|
            | 🌱 | < 1,000/h | Normal |
            | 🚀 | 1,000 - 10,000/h | Trending |
            | 🔥 | ≥ 10,000/h | Viral |
